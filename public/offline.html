<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | Vodivus</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #030814;
        color: #f5efe4;
        font-family: "Cormorant Garamond", serif;
      }
      .card {
        width: min(640px, calc(100% - 32px));
        padding: 24px;
        border-radius: 16px;
        border: 1px solid rgba(120, 170, 220, 0.4);
        background: rgba(8, 14, 28, 0.72);
      }
      h1 {
        margin: 0 0 8px;
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(28px, 5vw, 42px);
      }
      p {
        margin: 0;
        font-size: clamp(18px, 2.4vw, 24px);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <h1>You are offline</h1>
      <p>The Vodivus shell is available, but this page needs a connection to refresh.</p>
    </main>
  </body>
</html>
